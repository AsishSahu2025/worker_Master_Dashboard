<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Gateway</title>
    <!-- Add any necessary CSS stylesheets here -->
    <style>
        /* Add your CSS styles here */
    </style>
</head>
<body>
    <h2>Enter your name</h2>
    
    <!-- Add any necessary HTML content here -->
    <form id="nameForm">
        <label for="name">Name:</label>
        <input type="text" id="name" name="name" required>
        <button type="submit" id="submitButton">Submit</button>
    </form>

    <!-- Add any necessary JavaScript code here -->
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <script>
        document.getElementById('nameForm').addEventListener('submit', function(event){
            event.preventDefault(); // Prevent form submission
            
            var nameInput = document.getElementById('name').value;
            
            fetch('', {
                method: 'POST',
                body: JSON.stringify({
                    name: nameInput
                }),
                headers: {
                    'Content-Type': 'application/json'
                }
            })
            .then(response => response.json())
            .then(data => {
                var options = {
                    "key": data.key,
                    "amount": data.amount,
                    "currency": data.currency,
                    "name": data.name,
                    "description": data.description,
                    "image": data.image,
                    "order_id": data.id,
                    "handler": function (response){
                        // Handle the payment success response here
                        // alert('Payment successful');
                        window.location.href = "/gateway/success"
                    },
                    "prefill": {
                        "name": "", // Pre-fill the customer's name if available
                        "email": "" // Pre-fill the customer's email if available
                    },
                    "theme": {
                        "color": "#3399cc" // Set your desired color theme
                    }
                };
                var rzp1 = new Razorpay(options);
                rzp1.open();
            })
            .catch(error => {
                console.error('Error:', error);
            });
        });
    </script>
</body>
</html>
